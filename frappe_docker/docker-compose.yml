x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-$ERPNEXT_VERSION}
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - ../frappe_app/user_analytics:/home/frappe/frappe-bench/apps/user_analytics

services:
  db:
    image: mariadb:11.8
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: ${RESTART_POLICY:-unless-stopped}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-admin}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  redis-cache:
    image: redis:6.2-alpine
    platform: linux/amd64
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:6.2-alpine
    platform: linux/amd64
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - redis-queue-data:/data

  configurator:
    <<: *backend_defaults
    platform: linux/amd64
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps | grep -v user_analytics > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      REDIS_CACHE: ${REDIS_CACHE:-redis-cache:6379}
      REDIS_QUEUE: ${REDIS_QUEUE:-redis-queue:6379}
      SOCKETIO_PORT: ${SOCKETIO_PORT:-9000}
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  create-site:
    <<: *backend_defaults
    platform: linux/amd64
    entrypoint:
      - bash
      - -c
    command:
      - >
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        /home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/user_analytics;
        ln -sf /home/frappe/frappe-bench/apps/user_analytics /home/frappe/frappe-bench/env/lib/python3.14/site-packages/user_analytics;
        echo -e "\nuser_analytics" >> sites/apps.txt;
        bench new-site frontend --mariadb-user-host-login-scope='%' --admin-password=${ADMIN_PASSWORD:-admin} --db-root-username=root --db-root-password=${MYSQL_ROOT_PASSWORD:-admin} --install-app erpnext --set-default;
        bench --site frontend install-app user_analytics;
        bench --site frontend migrate;
        bench --site frontend clear-cache;
    depends_on:
      configurator:
        condition: service_completed_successfully
    restart: on-failure

  backend:
    <<: *backend_defaults
    platform: linux/amd64
    entrypoint:
      - bash
      - -c
      - /home/frappe/frappe-bench/env/bin/pip install -e /home/frappe/frappe-bench/apps/user_analytics && ln -sf /home/frappe/frappe-bench/apps/user_analytics /home/frappe/frappe-bench/env/lib/python3.14/site-packages/user_analytics && /usr/local/bin/entrypoint.sh bench serve --port 8000
    environment:
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}

  frontend:
    <<: *customizable_image
    platform: linux/amd64
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ../frappe_app/user_analytics:/home/frappe/frappe-bench/apps/user_analytics
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8080"
    depends_on:
      - backend
      - websocket

  websocket:
    <<: [*depends_on_configurator, *customizable_image]
    platform: linux/amd64
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ../frappe_app/user_analytics:/home/frappe/frappe-bench/apps/user_analytics
    environment:
      FRAPPE_REDIS_CACHE: redis://${REDIS_CACHE:-redis-cache:6379}
      FRAPPE_REDIS_QUEUE: redis://${REDIS_QUEUE:-redis-queue:6379}

  queue-short:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    platform: linux/amd64
    command: bench schedule

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  sites: