{% extends "templates/web.html" %}

{% block title %}{{ _("用户增长数据大屏") }}{% endblock %}

{% block page_content %}
<div id="dashboard-container">
    <style>
        :root {
            --primary-blue: #00d4ff;
            --primary-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --bg-dark: #0a0e1a;
            --bg-card: rgba(20, 30, 50, 0.9);
            --border-glow: rgba(0, 212, 255, 0.3);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
            height: 100vh !important;
        }

        .navbar, .page-breadcrumbs, footer, .page-header-wrapper, .web-footer { display: block !important; }
        .page-content-wrapper, .container { padding: 0 !important; margin: 0 !important; max-width: 100% !important; width: 100% !important; }

        #dashboard-container.is-fullscreen ~ *,
        #dashboard-container.is-fullscreen .navbar,
        .fullscreen-hide { display: none !important; }

        /* Hide Frappe nav/footer ONLY in fullscreen */
        body.is-fullscreen-mode .navbar,
        body.is-fullscreen-mode .navbar-expand-lg,
        body.is-fullscreen-mode .page-breadcrumbs,
        body.is-fullscreen-mode footer,
        body.is-fullscreen-mode .page-header-wrapper,
        body.is-fullscreen-mode .web-footer,
        body.is-fullscreen-mode .main-header,
        body.is-fullscreen-mode .main-section > header,
        body.is-fullscreen-mode .main-section > nav,
        body.is-fullscreen-mode nav.navbar { display: none !important; }

        :fullscreen .navbar,
        :fullscreen .navbar-expand-lg,
        :fullscreen .page-breadcrumbs,
        :fullscreen footer,
        :fullscreen .page-header-wrapper,
        :fullscreen .web-footer,
        :fullscreen .main-header,
        :fullscreen .main-section > header,
        :fullscreen .main-section > nav,
        :fullscreen nav.navbar { display: none !important; }

        #dashboard-container.is-fullscreen .header { display: none; }

        #dashboard-container {
            height: 100vh !important;
            width: 100vw !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 99999 !important;
            padding: 0.4vh 0.4vw;
            display: flex;
            flex-direction: column;
        }

        #dashboard-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary-blue);
            border-radius: 50%;
            opacity: 0;
            animation: float 6s infinite ease-in-out;
            box-shadow: 0 0 8px var(--primary-blue);
        }

        @keyframes float {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.8; transform: translateY(80vh) scale(1); }
            90% { opacity: 0.8; transform: translateY(20vh) scale(1); }
            95% { opacity: 0.3; transform: translateY(10vh) scale(0.5); }
        }

        .header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5vh 0.8vw;
            background: rgba(10, 14, 26, 0.95);
            border-radius: 6px;
            border: 1px solid var(--border-glow);
            margin-bottom: 0.4vh;
            flex-shrink: 0;
            min-height: 32px;
        }

        .header .header-title {
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .tools {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .header .period-selector {
            padding: 2px 7px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 9px;
            cursor: pointer;
            outline: none;
        }

        .header .period-selector option {
            background: #1a1a2e;
            color: white;
        }

        .header .btn {
            padding: 2px 7px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .header .btn-icon {
            width: 11px;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header .btn-icon svg {
            width: 100%;
            height: 100%;
            fill: white;
        }

        .header .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            color: white;
        }

        .header .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dashboard-grid {
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: 12vw 1fr;
            grid-template-rows: 1fr 5vh;
            gap: 0.4vh;
            flex: 1;
            min-height: 0;
            padding: 0 5px;
        }

        #dashboard-container.is-fullscreen .header-title { display: none; }
        #dashboard-container.is-fullscreen .dashboard-grid { flex: 1; }

        .left-panel {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 0.3vh;
            min-height: 0;
        }

        .kpi-card {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 0.72vh 0.54vw;
            border: 1px solid var(--border-glow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transform: scale(0.8);
            transform-origin: center center;
        }

        .kpi-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0, 212, 255, 0.2);
        }

        .kpi-card .icon { display: none; }

        .kpi-card .label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            width: 100%;
            padding-top: 2px;
            margin-bottom: auto;
        }

        .kpi-card .value {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-top: auto;
            margin-bottom: 0;
        }

        .kpi-card .change {
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            width: 100%;
            text-align: center;
            margin-bottom: auto;
        }

        .kpi-card .change.up { color: var(--accent-green); }
        .kpi-card .change.down { color: var(--accent-red); }

        .right-panel {
            display: grid;
            grid-template-rows: repeat(2, 1fr);
            grid-template-columns: repeat(2, 1fr);
            gap: 0.4vh;
            min-height: 0;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 0.54vh 0.45vw;
            border: 1px solid var(--border-glow);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            min-height: 0;
            transform: scale(0.924);
            transform-origin: center center;
            position: relative;
            overflow: hidden;
        }

        .chart-card .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .chart-card .chart-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chart-card .chart-subtitle {
            font-size: 7px;
            color: var(--text-secondary);
        }

        .chart-card .chart-body {
            flex: 1;
            position: relative;
            min-height: 0;
            overflow: hidden;
            transform: scale(0.977);
            transform-origin: center center;
        }

        .chart-card canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .bottom-panel {
            grid-column: span 2;
            background: var(--bg-card);
            border-radius: 6px;
            padding: 0.45vh 0.72vw;
            border: 1px solid var(--border-glow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
            margin: 0 -7.5px;
        }

        .bottom-panel .panel-title {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .events-container {
            display: flex;
            gap: 7px;
            overflow: hidden;
            position: relative;
            height: 18px;
        }

        .events-track {
            display: flex;
            gap: 12px;
            animation: scrollLeft 30s linear infinite;
        }

        .events-track:hover {
            animation-play-state: paused;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 7.5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .event-item .event-icon {
            width: 15px;
            height: 15px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5px;
        }

        .event-item .event-icon.on { background: rgba(34, 197, 94, 0.2); color: var(--accent-green); }
        .event-item .event-icon.off { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }

        .event-item .event-name {
            font-size: 7px;
            font-weight: 500;
        }

        .event-item .event-detail {
            font-size: 5px;
            color: var(--text-secondary);
        }

        @media (max-width: 1200px) {
            .dashboard-grid {
                grid-template-columns: 10vw 1fr;
            }
        }
    </style>

    <div class="grid-pattern"></div>
    <div class="particles" id="particles"></div>

    <div class="header">
        <div class="header-title">用户增长数据大屏</div>
        <div class="tools">
            <select class="period-selector" id="period-selector">
                <option value="7">最近7天</option>
                <option value="30" selected>最近30天</option>
                <option value="90">最近90天</option>
            </select>
            <button class="btn btn-secondary" id="btn-refresh">
                <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg></div>
                刷新
            </button>
            <button class="btn btn-secondary" id="btn-csv">
                <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
                CSV
            </button>
            <button class="btn btn-secondary" id="btn-png">
                <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
                PNG
            </button>
            <button class="btn btn-primary" id="btn-fullscreen">
                <div class="btn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></div>
                全屏
            </button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="left-panel">
            <div class="kpi-card">
                <div class="icon green">👥</div>
                <div class="label">活跃用户</div>
                <div class="value" id="kpi-active-users">0</div>
                <div class="change up" id="kpi-active-change">+0%</div>
            </div>
            <div class="kpi-card">
                <div class="icon blue">🚀</div>
                <div class="label">新增开通</div>
                <div class="value" id="kpi-new-activations">0</div>
                <div class="change up" id="kpi-activation-change">+0%</div>
            </div>
            <div class="kpi-card">
                <div class="icon orange">📉</div>
                <div class="label">用户流失</div>
                <div class="value" id="kpi-churned-users">0</div>
                <div class="change down" id="kpi-churn-change">+0%</div>
            </div>
            <div class="kpi-card">
                <div class="icon red">💰</div>
                <div class="label">收入</div>
                <div class="value" id="kpi-revenue">¥0</div>
                <div class="change up" id="kpi-revenue-change">+0%</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="chart-card">
                <div class="chart-header">
                    <div>
                        <div class="chart-title">用户增长趋势</div>
                        <div class="chart-subtitle">开通 vs 流失</div>
                    </div>
                </div>
                <div class="chart-body"><canvas id="chart-trend"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div>
                        <div class="chart-title">地区分布</div>
                        <div class="chart-subtitle">活跃用户 - 扇形图</div>
                    </div>
                </div>
                <div class="chart-body"><canvas id="chart-region"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div>
                        <div class="chart-title">套餐分布</div>
                        <div class="chart-subtitle">活跃用户</div>
                    </div>
                </div>
                <div class="chart-body"><canvas id="chart-plan"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div>
                        <div class="chart-title">渠道贡献</div>
                        <div class="chart-subtitle">新增开通 - 条形图</div>
                    </div>
                </div>
                <div class="chart-body"><canvas id="chart-channel"></canvas></div>
            </div>
        </div>

        <div class="bottom-panel">
            <div class="panel-title">最近事件</div>
            <div class="events-container">
                <div class="events-track" id="events-track"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        if (typeof html2canvas === 'undefined') {
            var s = document.createElement('script');
            s.src = 'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js';
            s.onerror = function() { console.error('html2canvas failed to load from all CDNs'); };
            document.head.appendChild(s);
        }
        var charts = {};

        function formatCurrency(value) {
            return '\u00a5' + value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function createTrendChart(labels, activations, churns) {
            var ctx = document.getElementById('chart-trend').getContext('2d');
            if (charts.trend) charts.trend.destroy();
            charts.trend = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '\u5f00\u901a', data: activations, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#22c55e' },
                        { label: '\u6d41\u5931', data: churns, borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4, pointRadius: 3, pointBackgroundColor: '#ef4444' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { color: 'rgba(255,255,255,0.6)', font: { size: 7 }, boxWidth: 9, padding: 3 } } },
                    scales: {
                        x: { ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 6 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 6 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        function createPieChart(canvasId, labels, values, colors) {
            var ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            charts[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: { labels: labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { color: 'rgba(255,255,255,0.6)', font: { size: 7 }, padding: 2, boxWidth: 7 } } }
                }
            });
        }

        function createBarChart(canvasId, labels, values, colors) {
            var ctx = document.getElementById(canvasId).getContext('2d');
            if (charts[canvasId]) charts[canvasId].destroy();
            charts[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ data: values, backgroundColor: colors, borderRadius: 4, barThickness: 'flex' }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 7 } }, grid: { display: false } },
                        y: { ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 6 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        }

        function renderEvents(events) {
            var track = document.getElementById('events-track');
            var html = events.map(function(e) {
                var iconClass = e.event_type === '\u5f00\u901a' ? 'on' : 'off';
                var icon = e.event_type === '\u5f00\u901a' ? '+' : '-';
                return '<div class="event-item"><div class="event-icon ' + iconClass + '">' + icon + '</div><div><div class="event-name">' + e.user_name + '</div><div class="event-detail">' + e.event_type + ' \u00b7 ' + e.service_plan + '</div></div></div>';
            }).join('');
            track.innerHTML = html + html;
        }

        function updateDashboard(days) {
            days = days || 30;
            fetch('/api/method/user_analytics.pages.user_growth_dashboard.get_dashboard_data?days=' + days)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.message) {
                        var r = data.message;
                        document.getElementById('kpi-active-users').textContent = r.kpi.active_users;
                        document.getElementById('kpi-new-activations').textContent = r.kpi.new_activations;
                        document.getElementById('kpi-churned-users').textContent = r.kpi.churned_users;
                        document.getElementById('kpi-revenue').textContent = formatCurrency(r.kpi.revenue);
                        document.getElementById('kpi-active-change').textContent = (r.kpi.active_users_change >= 0 ? '+' : '') + r.kpi.active_users_change + '%';
                        document.getElementById('kpi-activation-change').textContent = (r.kpi.new_activations_change >= 0 ? '+' : '') + r.kpi.new_activations_change + '%';
                        document.getElementById('kpi-churn-change').textContent = (r.kpi.churned_users_change >= 0 ? '+' : '') + r.kpi.churned_users_change + '%';
                        document.getElementById('kpi-revenue-change').textContent = (r.kpi.revenue_change >= 0 ? '+' : '') + r.kpi.revenue_change + '%';
                        createTrendChart(r.trend.dates, r.trend.activations, r.trend.churns);
                        createPieChart('chart-region', r.region_distribution.labels, r.region_distribution.values, ['#00d4ff','#a855f7','#22c55e','#f97316','#6b7280']);
                        createPieChart('chart-plan', r.plan_distribution.labels, r.plan_distribution.values, ['#00d4ff','#a855f7','#22c55e']);
                        createBarChart('chart-channel', r.channel_distribution.labels, r.channel_distribution.values, ['#00d4ff','#a855f7','#22c55e','#f97316']);
                        renderEvents(r.recent_events);
                    }
                })
                .catch(function(err) { console.error('Dashboard fetch error:', err); });
        }

        document.getElementById('period-selector').addEventListener('change', function(e) { updateDashboard(parseInt(e.target.value)); });
        document.getElementById('btn-refresh').addEventListener('click', function() { updateDashboard(parseInt(document.getElementById('period-selector').value)); });

        document.getElementById('btn-csv').addEventListener('click', function() {
            fetch('/api/method/user_analytics.pages.user_growth_dashboard.export_csv')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.message) {
                        var blob = new Blob([data.message], { type: 'text/csv' });
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = 'user_growth_data.csv';
                        a.click();
                        URL.revokeObjectURL(url);
                    }
                });
        });

        document.getElementById('btn-png').addEventListener('click', function() {
            if (typeof html2canvas === 'undefined') {
                alert('\u622a\u56fe\u529f\u80fd\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5\u7f51\u7edc\u8fde\u63a5');
                return;
            }
            var container = document.getElementById('dashboard-container');
            var wasFullscreen = container.classList.contains('is-fullscreen');
            html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#0a0e1a' }).then(function(canvas) {
                var link = document.createElement('a');
                link.download = 'user_growth_dashboard.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(function(err) {
                console.error('Screenshot failed:', err);
                alert('\u622a\u56fe\u5931\u8d25: ' + err.message);
            });
        });

        document.getElementById('btn-fullscreen').addEventListener('click', function() {
            var c = document.getElementById('dashboard-container');
            if (!document.fullscreenElement) {
                c.requestFullscreen().then(function() {
                    c.classList.add('is-fullscreen');
                    document.body.classList.add('is-fullscreen-mode');
                    Object.keys(charts).forEach(function(k) { if (charts[k]) charts[k].resize(); });
                });
            } else {
                document.exitFullscreen().then(function() {
                    c.classList.remove('is-fullscreen');
                    document.body.classList.remove('is-fullscreen-mode');
                    Object.keys(charts).forEach(function(k) { if (charts[k]) charts[k].resize(); });
                });
            }
        });

        document.addEventListener('fullscreenchange', function() {
            var c = document.getElementById('dashboard-container');
            if (!document.fullscreenElement) {
                c.classList.remove('is-fullscreen');
                document.body.classList.remove('is-fullscreen-mode');
                Object.keys(charts).forEach(function(k) { if (charts[k]) charts[k].resize(); });
            }
        });

        function initParticles() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 15; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 6 + 's';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }

        initParticles();
        updateDashboard(30);
    </script>
</div>
{% endblock %}
